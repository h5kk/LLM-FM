schema_version: 1
project_name: LLM-FM
docs_root: docs/feature-memory
mode: small

features:
  plugin-core:
    title: "Plugin Core"
    globs:
      - "plugin/.claude-plugin/**"
      - "plugin/assets/**"
      - ".claude-plugin/**"
      - "marketplace.json"
      - "images/**"
      - "README.md"
      - "docs/github-profile.md"
  hooks:
    title: "Lifecycle Hooks"
    globs:
      - "plugin/hooks/**"
  skills:
    title: "Skills"
    globs:
      - "plugin/skills/**"
  reviewer:
    title: "Reviewer Agent"
    globs:
      - "plugin/agents/**"
  specs:
    title: "Specifications"
    globs:
      - "docs/specs/**"
      - "docs/RepoTest_Iteration1/**"
      - "feature-memory-architecture-plan.md"
      - ".feature-memory/config.yaml"
  cli:
    title: "CLI (planned)"
    globs:
      - "fm_init.py"
      - "src/**"

mapping:
  default_confidence: medium
  unmapped_policy: report
  route_patterns: []
  test_patterns:
    - "tests/**"
    - "**/*_test.*"
    - "**/*.test.*"

# Paths matching these globs are never recorded as changelog entries.
# The built-in defaults (*.pyc, *.lock, node_modules/**, etc.) always apply;
# list additional project-specific patterns here.
skip_patterns: []

tagging:
  strategy: cli   # cli | keyword | none

# Changelog configurability (all keys optional; omission = prior behavior).
changelog:
  verbosity: normal          # terse | normal | detailed
  summary_rule: ""           # optional steering instruction for topic tagging
  tagging: true              # master switch; false overrides tagging.strategy -> none
  highlight_tags:            # tags that drive Dev Sync "Watch out" highlights
    - breaking-change
    - api-change
    - security
    - schema-change
    - data-migration
  metrics:
    enabled: true            # show the Metrics tab in the viewer
    code_churn: false        # backfill-only: git numstat per commit (--code-churn)
  custom_docs:
    enabled: true            # ingest custom/wiki docs + show the Wiki tab
    dir: docs/feature-memory/custom
